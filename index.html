<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник</title>

    <meta property="og:title" content="Справочник" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="https://grimvpn.github.io/book/bookpreview.png" />
    <meta property="og:url" content="https://grimvpn.github.io/book/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; 
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            text-align: center;
            padding: 30px 0;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 { margin: 0; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }
        
        .subject-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            text-decoration: none;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            backdrop-filter: blur(5px);
        }
        
        .subject-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #5b9bd5;
            color: #5b9bd5;
            background-color: white;
        }

        /* === ТЁМНАЯ ТЕМА === */
        body.dark-theme {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-theme header {
            background-color: #1e1e1e;
        }
        body.dark-theme .subject-btn {
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        body.dark-theme .subject-btn:hover {
            border-color: #5b9bd5;
            background-color: #1e1e1e;
        }

        /* Кнопка смены темы для главной (плавающая) */
        .theme-toggle-btn-index {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #1a252f;
            color: white;
            border: 1px solid #5b9bd5;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .theme-toggle-btn-index:hover {
            background-color: #5b9bd5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Выбери предмет</h1>
    </header>

    <div class="grid-container">
        <a href="tpand.html" class="subject-btn">Математика</a>
    </div>

    <button class="theme-toggle-btn-index" id="themeToggle" onclick="toggleTheme()">
        🌙
    </button>

    <script>
        const themeBtn = document.getElementById('themeToggle');
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeBtn.innerHTML = '☀️';
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-theme');
            
            if (body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
                themeBtn.innerHTML = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeBtn.innerHTML = '🌙';
            }
        }
    </script>
</body>
</html>
