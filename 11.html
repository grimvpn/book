<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школьный Справочник</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            text-align: center;
            padding: 30px 0;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }
        .subject-btn {
            background-color: white;
            color: #2c3e50;
            text-decoration: none;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .subject-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #5b9bd5;
            color: #5b9bd5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Выбери предмет</h1>
    </header>

    <div class="grid-container">
        <a href="tpand.html" class="subject-btn">Математика</a>
        
        <a href="#" class="subject-btn">Алгебра</a>
        <a href="#" class="subject-btn">Геометрия</a>
        <a href="#" class="subject-btn">Информатика</a>
        <a href="#" class="subject-btn">Химия</a>
        <a href="#" class="subject-btn">Биология</a>
        <a href="#" class="subject-btn">Русский язык</a>
    </div>

</body>
</html>
